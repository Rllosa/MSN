# nginx config for the frontend container.
# Serves the React SPA static files only.
# /api/ and /ws routing are handled by the host nginx on the VPS.

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React client-side routing — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check for Docker healthcheck and host nginx upstream checks
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable access logs for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
