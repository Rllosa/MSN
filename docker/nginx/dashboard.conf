# Host nginx server block for dashboard.blackpalm-sxm.com
# Install at: /etc/nginx/sites-available/dashboard
# Symlink:    sudo ln -s /etc/nginx/sites-available/dashboard /etc/nginx/sites-enabled/
#
# Certbot will append SSL directives automatically when you run:
#   sudo certbot --nginx -d dashboard.blackpalm-sxm.com

server {
    listen 80;
    server_name dashboard.blackpalm-sxm.com;

    # Redirect all HTTP to HTTPS (Certbot manages this block)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dashboard.blackpalm-sxm.com;

    # SSL — managed by Certbot
    # ssl_certificate     /etc/letsencrypt/live/dashboard.blackpalm-sxm.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dashboard.blackpalm-sxm.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ---------------------------------------------------------------------------
    # WebSocket — /ws → backend (must come before the generic /api/ block)
    # ---------------------------------------------------------------------------
    location /ws {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived WebSocket connections alive
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------------------------------------------------------------------------
    # Backend API — /api/ → backend
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow larger request bodies (e.g. future file uploads)
        client_max_body_size 10m;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---------------------------------------------------------------------------
    # Media attachments (cached Airbnb images served by backend)
    # ---------------------------------------------------------------------------
    location /media/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Long cache — files are content-addressed (sha256 names)
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ---------------------------------------------------------------------------
    # Frontend — everything else → React SPA (frontend container)
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
